name: Agent Host Packaging

on:
  push:
    paths:
      - ".github/workflows/agent-host-packaging.yml"
      - "agent-host/pyproject.toml"
      - "agent-host/uv.lock"
      - "agent-host/src/**"
      - "agent-host/tests/test_baml_generation.py"
      - "agent-host/tests/test_filesystem_*.py"
      - "agent-host/tests/installed_wheel_smoke.py"
      - "agent-host/tests/test_workspace_*.py"
      - "workspace-fs/**"
  pull_request:
    paths:
      - ".github/workflows/agent-host-packaging.yml"
      - "agent-host/pyproject.toml"
      - "agent-host/uv.lock"
      - "agent-host/src/**"
      - "agent-host/tests/test_baml_generation.py"
      - "agent-host/tests/test_filesystem_*.py"
      - "agent-host/tests/installed_wheel_smoke.py"
      - "agent-host/tests/test_workspace_*.py"
      - "workspace-fs/**"

permissions:
  contents: read

concurrency:
  group: agent-host-packaging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wheel-smoke:
    name: Build and smoke-test runtime wheels
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      RUSTUP_TOOLCHAIN: "1.93.0"
    steps:
      - name: Check out ReframeWeb
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83e3 # v6.0.2
        with:
          persist-credentials: false

      - name: Check out the pinned BAML runtime
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83e3 # v6.0.2
        with:
          repository: jubjub727/baml
          ref: bbb99a793d707175663c4e9236400a9bcd830f57
          path: .ci/baml
          persist-credentials: false

      - name: Install the runtime Rust toolchain
        run: rustup toolchain install 1.93.0 --profile minimal

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Build all runtime distributions
        shell: bash
        run: |
          wheels="$RUNNER_TEMP/reframe-runtime-wheels"
          mkdir -p "$wheels"
          uv build --wheel --out-dir "$wheels" \
            .ci/baml/baml_language/sdks/python
          uv build --wheel --out-dir "$wheels" workspace-fs
          uv build --wheel --out-dir "$wheels" agent-host

      - name: Resolve the wheel's published dependency graph
        shell: bash
        run: |
          wheels="$RUNNER_TEMP/reframe-runtime-wheels"
          resolver="$RUNNER_TEMP/reframe-wheel-resolver"
          uv venv --python 3.12 "$resolver"
          uv pip install --python "$resolver/bin/python" --dry-run \
            --find-links "$wheels" \
            "$wheels"/reframe_agent_host-*.whl

      - name: Install wheels into an isolated environment
        shell: bash
        run: |
          wheels="$RUNNER_TEMP/reframe-runtime-wheels"
          smoke="$RUNNER_TEMP/reframe-wheel-smoke"
          uv venv --python 3.12 "$smoke"
          uv pip install --python "$smoke/bin/python" \
            "numpy==2.5.0" \
            "pydantic==2.13.4" \
            "protobuf==7.35.1" \
            "surrealdb==2.0.0" \
            "typing-extensions==4.15.0"
          uv pip install --python "$smoke/bin/python" --no-deps \
            "$wheels"/baml_bridge-*.whl \
            "$wheels"/reframe_workspace_daemon-*.whl \
            "$wheels"/reframe_agent_host-*.whl

      - name: Exercise the installed generated runtime and daemon distribution
        shell: bash
        working-directory: agent-host
        run: |
          unset REFRAME_WORKSPACE_DAEMON
          "$RUNNER_TEMP/reframe-wheel-smoke/bin/python" \
            tests/installed_wheel_smoke.py

      - name: Run installed workspace orchestration tests
        shell: bash
        working-directory: agent-host
        run: |
          export PATH="$RUNNER_TEMP/reframe-wheel-smoke/bin:$PATH"
          unset REFRAME_WORKSPACE_DAEMON
          python="$RUNNER_TEMP/reframe-wheel-smoke/bin/python"
          "$python" -m unittest tests.test_baml_generation -v
          "$python" -m unittest discover -s tests -p "test_filesystem_*.py" -v
          "$python" -m unittest discover -s tests -p "test_workspace_*.py" -v
          export REFRAME_WORKSPACE_DAEMON="$RUNNER_TEMP/reframe-wheel-smoke/bin/reframe-workspace-daemon"
          "$python" -m unittest tests.test_workspace_contract -v

  wheel-smoke-windows:
    name: Build and smoke-test Windows runtime wheels
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      RUSTUP_TOOLCHAIN: "1.93.0"
    steps:
      - name: Check out ReframeWeb
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83e3 # v6.0.2
        with:
          persist-credentials: false

      - name: Check out the pinned BAML runtime
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83e3 # v6.0.2
        with:
          repository: jubjub727/baml
          ref: bbb99a793d707175663c4e9236400a9bcd830f57
          path: .ci/baml
          persist-credentials: false

      - name: Install the runtime Rust toolchain
        run: rustup toolchain install 1.93.0 --profile minimal

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Build Windows runtime distributions
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          $wheels = Join-Path $env:RUNNER_TEMP "reframe-runtime-wheels"
          New-Item -ItemType Directory -Force -Path $wheels | Out-Null
          uv build --wheel --out-dir $wheels `
            .ci/baml/baml_language/sdks/python
          uv build --wheel --out-dir $wheels workspace-fs
          uv build --wheel --out-dir $wheels agent-host

      - name: Install Windows wheels into an isolated environment
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          $wheels = Join-Path $env:RUNNER_TEMP "reframe-runtime-wheels"
          $smoke = Join-Path $env:RUNNER_TEMP "reframe-wheel-smoke"
          $python = Join-Path $smoke "Scripts/python.exe"
          uv venv --python 3.12 $smoke
          uv pip install --python $python `
            "numpy==2.5.0" `
            "pydantic==2.13.4" `
            "protobuf==7.35.1" `
            "surrealdb==2.0.0" `
            "typing-extensions==4.15.0"
          $runtimeWheels = @(
            (Get-ChildItem $wheels -Filter "baml_bridge-*.whl").FullName
            (Get-ChildItem $wheels -Filter "reframe_workspace_daemon-*.whl").FullName
            (Get-ChildItem $wheels -Filter "reframe_agent_host-*.whl").FullName
          )
          uv pip install --python $python --no-deps $runtimeWheels

      - name: Exercise the installed Windows runtime
        shell: pwsh
        working-directory: agent-host
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          Remove-Item Env:REFRAME_WORKSPACE_DAEMON -ErrorAction SilentlyContinue
          $smoke = Join-Path $env:RUNNER_TEMP "reframe-wheel-smoke"
          $python = Join-Path $smoke "Scripts/python.exe"
          & $python tests/installed_wheel_smoke.py

      - name: Run the installed Windows live contract
        shell: pwsh
        working-directory: agent-host
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          $smoke = Join-Path $env:RUNNER_TEMP "reframe-wheel-smoke"
          $python = Join-Path $smoke "Scripts/python.exe"
          $env:REFRAME_WORKSPACE_DAEMON = Join-Path `
            $smoke "Scripts/reframe-workspace-daemon.exe"
          & $python -m unittest tests.test_workspace_contract -v
