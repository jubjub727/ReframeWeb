name: BAML Generated Output

on:
  push:
    paths:
      - ".gitattributes"
      - ".github/workflows/baml-generated.yml"
      - "agent-host/baml.toml"
      - "agent-host/baml_src/**"
      - "agent-host/pyproject.toml"
      - "agent-host/uv.lock"
      - "agent-host/src/baml_sdk/**"
      - "agent-host/src/reframe_agent_host/baml_artifacts.py"
      - "agent-host/src/reframe_agent_host/baml_generation.py"
      - "agent-host/tests/test_baml_generation.py"
  pull_request:
    paths:
      - ".gitattributes"
      - ".github/workflows/baml-generated.yml"
      - "agent-host/baml.toml"
      - "agent-host/baml_src/**"
      - "agent-host/pyproject.toml"
      - "agent-host/uv.lock"
      - "agent-host/src/baml_sdk/**"
      - "agent-host/src/reframe_agent_host/baml_artifacts.py"
      - "agent-host/src/reframe_agent_host/baml_generation.py"
      - "agent-host/tests/test_baml_generation.py"

permissions:
  contents: read

concurrency:
  group: baml-generated-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generated-output:
    name: Verify generated BAML SDK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Check out ReframeWeb
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83e3 # v6.0.2
        with:
          persist-credentials: false

      - name: Check out the pinned BAML fork
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83e3 # v6.0.2
        with:
          repository: jubjub727/baml
          ref: bbb99a793d707175663c4e9236400a9bcd830f57
          path: .ci/baml
          persist-credentials: false

      - name: Install the fork's Rust toolchain
        run: rustup toolchain install 1.93.0 --profile minimal

      - name: Build baml_cli from the pinned fork
        run: >-
          cargo +1.93.0 build
          --manifest-path .ci/baml/baml_language/Cargo.toml
          --release --locked --package baml_cli --bin baml-cli

      - name: Expose the fork binary as baml
        shell: bash
        run: |
          install -d "$RUNNER_TEMP/reframe-baml/bin"
          install -m 755 \
            .ci/baml/baml_language/target/release/baml-cli \
            "$RUNNER_TEMP/reframe-baml/bin/baml"
          echo "$RUNNER_TEMP/reframe-baml/bin" >> "$GITHUB_PATH"

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Run reframe-check-baml
        working-directory: agent-host
        env:
          PYTHONPATH: ${{ github.workspace }}/agent-host/src
        run: >-
          uv run --no-project --python 3.12 --with pydantic
          python -m reframe_agent_host.baml_generation

      - name: Test generated-output normalization
        working-directory: agent-host
        env:
          PYTHONPATH: ${{ github.workspace }}/agent-host/src
        run: >-
          uv run --no-project --python 3.12 --with pydantic
          python -m unittest tests.test_baml_generation -v

      - name: Require committed generated output
        shell: bash
        run: |
          git diff --exit-code -- agent-host/src/baml_sdk
          test -z "$(git status --porcelain --untracked-files=all -- agent-host/src/baml_sdk)"
