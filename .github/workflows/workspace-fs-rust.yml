name: Workspace FS Rust

on:
  push:
    paths:
      - ".github/workflows/workspace-fs-rust.yml"
      - "workspace-fs/**"
  pull_request:
    paths:
      - ".github/workflows/workspace-fs-rust.yml"
      - "workspace-fs/**"

permissions:
  contents: read

concurrency:
  group: workspace-fs-rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cargo-features: ""
          - os: windows-latest
            cargo-features: ""
          - os: macos-latest
            cargo-features: "--features ci-macos-no-mount"
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Check out ReframeWeb
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83e3 # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust quality tools
        run: rustup toolchain install 1.85.0 --profile minimal --component clippy,rustfmt

      - name: Check formatting
        working-directory: workspace-fs
        run: cargo +1.85.0 fmt --all -- --check

      - name: Run tests
        working-directory: workspace-fs
        run: cargo +1.85.0 test --workspace --all-targets --locked ${{ matrix.cargo-features }}

      - name: Run Clippy
        working-directory: workspace-fs
        run: cargo +1.85.0 clippy --workspace --all-targets --locked ${{ matrix.cargo-features }} -- -D warnings
