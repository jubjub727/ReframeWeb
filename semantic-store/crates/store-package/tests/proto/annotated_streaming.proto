syntax = "proto3";

package annotated_streaming;

import "reframe/semantic_store/options/v1/annotations.proto";

service Store {
  option (reframe.semantic_store.options.v1.store_service) = {
    store_id: "dev.reframe.fixture"
  };

  rpc Stream(stream Input) returns (stream Output) {
    option (reframe.semantic_store.options.v1.capability) = {
      id: "streaming.invalid"
      parent_topic_id: "streaming"
      title: "Streaming method"
      summary: "Intentionally binds protobuf streaming."
      guidance: { when_to_use: "Use only in an invalid fixture." }
      resource: { supports_subscriptions: true }
    };
  }
}

message Input {}
message Output {}
