[project]
name = "reframe-agent-host"
version = "0.1.0"
description = "Python Agent Host for ReframeWeb"
authors = [
    { name = "jubjub727", email = "matthewbrockgosnell@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "baml-py>=0.223.0",
    "faster-whisper>=1.2.1",
    "kokoro>=0.9.4",
    "pvporcupine>=4.0.3",
    "silero-vad>=6.2.1",
    "sounddevice>=0.5.5",
]

[project.scripts]
reframe-agent-host = "reframe_agent_host.cli:main"

[build-system]
requires = ["uv_build>=0.11.25,<0.12.0"]
build-backend = "uv_build"
